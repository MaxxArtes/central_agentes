version: '3.8'

services:
  # Gateway API (Para o Bubble)
  api-gateway:
    build: .
    container_name: agent-central-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    command: python api_server.py
    restart: always

  # Dashboard Streamlit (Para gerenciamento visual)
  dashboard:
    build: .
    container_name: agent-central-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/app
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    restart: always

  # Listener para Auto-Deploy (GitHub Webhook)
  webhook-deploy:
    build: .
    container_name: agent-central-webhook
    ports:
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock # Permite que o container gerencie o Docker do host
    command: python webhook_listener.py
    restart: always

  # Caddy para SSL Automático
  caddy:
    image: caddy:latest
    container_name: agent-central-ssl
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - agent-network

volumes:
  caddy_data:
  caddy_config:

networks:
  agent-network:
    driver: bridge
