version: '3.8'

services:
  # Gateway API (Para o Bubble)
  api-gateway:
    build: .
    container_name: agent-central-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    command: python api_server.py
    restart: always

  # Dashboard Streamlit (Para gerenciamento visual)
  dashboard:
    build: .
    container_name: agent-central-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/app
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    restart: always

networks:
  default:
    name: agent-network
